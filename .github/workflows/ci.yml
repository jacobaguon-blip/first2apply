name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck server-probe + libs
        run: npx nx run-many -t typecheck --projects=@first2apply/core,@first2apply/scraper,first2apply-server-probe

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: JobScanner regression tests
        working-directory: apps/desktopProbe
        run: npx vitest run

  build-server-probe-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build TS sources for image context
        run: |
          cd libraries/core && npm run build && cd ../..
          cd libraries/scraper && npm run build && cd ../..
          cd apps/serverProbe && npm run build && cd ../..
      - name: Build server-probe image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/serverProbe/Dockerfile
          platforms: linux/arm64
          load: true
          tags: f2a-server-probe:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  runtime-smoke-server-probe:
    needs: build-server-probe-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Restore image from build cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/serverProbe/Dockerfile
          platforms: linux/arm64
          load: true
          tags: f2a-server-probe:ci
          cache-from: type=gha
      - name: Selftest
        run: docker run --rm f2a-server-probe:ci --selftest
